<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Qlik App to JSON</title>
    <link rel="stylesheet" href="../../resources/autogenerated/qlik-styles.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Qlik App to JSON</h1>
        <div class="actions">
          <button id="exportBtn" class="btn btn-primary" disabled>Export Selected Apps</button>
          <div class="loader" id="loader">
            <div class="spinner"></div>
          </div>
        </div>
      </header>

      <div class="progress-container" id="progressContainer" style="display: none">
        <div class="progress">
          <div class="progress-bar" id="progressBar" style="width: 0%">
            <span class="progress-text">0%</span>
          </div>
        </div>
        <div class="progress-status" id="progressStatus">Processing 0/0 apps</div>
      </div>

      <div class="table-container">
        <div class="table-header">
          <div class="select-all">
            <input type="checkbox" id="selectAll" />
            <label for="selectAll">Select All Apps</label>
          </div>
        </div>
        <div id="tableLoading" class="table-loading">
          <div class="spinner"></div>
          <p>Loading apps...</p>
        </div>
        <table id="appTable">
          <thead>
            <tr>
              <th width="50px"></th>
              <th>App Name</th>
              <th>Last Modified</th>
              <!-- <th>Published</th> -->
            </tr>
          </thead>
          <tbody id="appList"></tbody>
        </table>
      </div>
    </div>
    <script src="../../resources/assets/external/requirejs/require.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
